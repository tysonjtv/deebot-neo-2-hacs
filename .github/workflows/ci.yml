name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Syntax, lint, and tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest ruff

      - name: Syntax check (compile all Python files)
        run: |
          python -m py_compile custom_components/deebot_neo_2/*.py
          python -m py_compile tests/*.py

      - name: Lint with ruff
        run: ruff check custom_components/

      - name: Run tests
        run: python -m pytest tests/ -v
